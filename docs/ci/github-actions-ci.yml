name: RepoKernel CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Unit tests
        run: python -m pytest tests/unit -q

      - name: Verify reference seed distribution
        run: repokernel verify-dist --seed-spec specs/reference/starter-l1.seed.json --dist-dir dist/reference/starter-l1

      - name: Minimal smoke path
        run: |
          repokernel validate-spec --kind source-manifest --input examples/minimal/source-manifest.json
          repokernel validate-spec --kind project-model --input examples/minimal/project-model.json
          repokernel validate-spec --kind seed-spec --input examples/minimal/seed-spec.json
          repokernel validate-bundle --source-manifest examples/minimal/source-manifest.json --project-model examples/minimal/project-model.json --seed-spec examples/minimal/seed-spec.json
          repokernel plan --seed-spec examples/minimal/seed-spec.json --source-manifest examples/minimal/source-manifest.json --project-model examples/minimal/project-model.json > plan.json
          repokernel validate-spec --kind generation-plan --input plan.json
          repokernel stage --plan plan.json --output-dir repokernel-staging
          repokernel guides --seed-spec examples/minimal/seed-spec.json --source-manifest examples/minimal/source-manifest.json > guides.json
          repokernel audit --path . --profile repokernel-source
